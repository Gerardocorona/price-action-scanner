# ============================================================
# pa_config.yaml — Configuración del Price Action Scanner
# Calibración visual basada en presentación de Eduardo (PRN-Million plus)
# ============================================================

# ── TIMEFRAMES ────────────────────────────────────────────────────────────
timeframes:
  macro:       "1h"      # Contexto de tendencia macro
  structure:   "5m"      # Identificar estructura y niveles S/R
  entry:       "2m"      # Trigger de entrada (debe estar CERRADO)

# ── NIVELES DE SOPORTE Y RESISTENCIA ──────────────────────────────────────
levels:
  pivot:
    price: 6583.89
    zone_tolerance: 4.5      # ← CALIBRADO: zonas NO son líneas exactas (imágenes 2, 5)
    historical_respect_rate: 0.75  # 75%+ de toques resultan en rebote

  resistance:
    - price: 6620.00
      zone_tolerance: 4.5
      historical_respect_rate: 0.80
      importance: "secondary"

    - price: 6650.00
      zone_tolerance: 4.5
      historical_respect_rate: 0.70
      importance: "tertiary"

  support:
    - price: 6540.00
      zone_tolerance: 4.5
      historical_respect_rate: 0.80
      importance: "secondary"

    - price: 6500.00
      zone_tolerance: 4.5
      historical_respect_rate: 0.70
      importance: "tertiary"

# ── DETECCIÓN DE PATRONES ──────────────────────────────────────────────────
pattern_detectors:

  pin_bar:
    enabled: true
    wick_ratio: 0.65        # Wick >= 65% de total range
    body_ratio: 0.30        # Body <= 30% de total range
    wick_to_body_ratio: 2.0 # Wick debe ser 2x el body
    min_volume_ratio: 0.8   # Volume >= 80% del promedio
    confidence_weight: 1.2

  engulfing:
    enabled: true
    body_ratio: 1.15        # Cuerpo actual >= 115% del anterior
    retest_likelihood: 0.70 # Probabilidad de retroceso
    confidence_weight: 1.3

  inside_bar:
    enabled: true
    range_ratio: 0.80       # Rango actual <= 80% del anterior (compresión)
    min_body_ratio: 0.25    # Body debe ser visible
    confidence_weight: 1.0

  shooting_star:
    enabled: true
    upper_wick_pct: 0.55    # Upper wick >= 55%
    body_ratio: 0.25        # Body <= 25%
    lower_wick_pct: 0.15    # Lower wick <= 15%
    confidence_weight: 1.2

  hammer:
    enabled: true
    lower_wick_pct: 0.55    # Lower wick >= 55%
    body_ratio: 0.25        # Body <= 25%
    upper_wick_pct: 0.15    # Upper wick <= 15%
    confidence_weight: 1.2

# ── RUPTURA + RETROCESO (Break and Retest) ───────────────────────────────
break_and_retest:
  enabled: true
  lookback_bars: 20         # Cuántas barras atrás buscar nivel de ruptura
  retest_tolerance: 2.5     # Tolerance para considerar "retroceso al nivel"
  min_break_range: 5.0      # Mínimo movimiento para considerar ruptura válida
  confidence_weight: 2.5    # ← CRÍTICO: Es el patrón visual PRINCIPAL (imagen 3)

# ── DETECCIÓN DE MERCADO LATERAL ──────────────────────────────────────────
lateral_market:
  enabled: true
  max_range_points: 15.0    # Si rango > 15pts en 5m → potencial lateral
  min_directional_bars_pct: 0.50  # Si < 50% bars son direccionales → lateral
  lookback_bars: 20         # Analizar últimas 20 barras para determinar

# ── CONFLUENCIA (Verificación de Factores) ────────────────────────────────
confluence:
  min_factors_to_trade: 3   # Mínimo de factores para generar señal

  # FACTORES Y PESOS (más alto = más importante)
  factor_weights:
    nivel_en_zona: 2.0                # Precio dentro de zona S/R (obligatorio)
    nivel_historical_respect: 1.8     # ← AUMENTADO: niveles respetados > 70%
    trend_alignment_1h: 1.5           # Tendencia 1H alineada con patrón
    trend_alignment_5m: 1.2           # Tendencia 5M alineada
    pattern_detected: 1.3             # Patrón identificado en 2m
    retest_after_break: 2.5           # ← CRÍTICO: Break + Retest detectado
    volume_confirmation: 0.8          # Volumen apoya movimiento
    ma_positioning: 0.7               # Precio vs medias móviles

  # FILTROS OBLIGATORIOS (RECHAZO INMEDIATO SI NO SE CUMPLEN)
  filters:
    - lateral_market_detected: false   # Si lateral → RECHAZAR (Eduardo: "No operar en lateral")
    - price_within_session: true       # Solo dentro de horarios de trading
    - no_conflicting_signals: true     # No hay orden pendiente en otro nivel

# ── EJECUCIÓN Y GESTIÓN DE RIESGO ─────────────────────────────────────────
execution:
  # Stop Loss y Take Profit (en puntos del subyacente)
  stop_loss_distance: 12.0          # SL = 12 puntos del entry
  take_profit_1_distance: 20.0      # ← CALIBRADO: TP1 lejos del entry (imagen 3)
  take_profit_2_distance: 35.0      # ← CALIBRADO: TP2 aún más lejos

  # Trailing Stop
  trailing_stop:
    enabled: true
    activate_after_points: 8.0      # Activar después de 8pts de ganancia
    trail_distance: 5.0              # Trail a 5pts de máximo

  # Gestión de órdenes
  max_contracts_per_signal: 2        # Máximo de contratos por setup
  session_max_signals: 5             # Máximo de 5 señales por sesión
  time_until_auto_close_minutes: 50  # Auto-close 10 mins antes del cierre

# ── HORARIOS DE TRADING ───────────────────────────────────────────────────
session_rules:
  market_open_time: "09:30"          # Hora de apertura (ET)
  market_close_time: "16:00"         # Hora de cierre (ET)
  avoid_first_minutes_open: 15       # Evitar primeros 15 mins (volatilidad)
  avoid_last_minutes_close: 10       # Evitar últimos 10 mins (volatilidad)
  timezone: "US/Eastern"

# ── CALIBRACIÓN CONTINUA ──────────────────────────────────────────────────
calibration:
  enabled: true
  grid_search_enabled: true

  # Parámetros que se optimizan automáticamente
  tunable_parameters:
    - "pattern_detectors.pin_bar.wick_ratio"
    - "pattern_detectors.pin_bar.body_ratio"
    - "levels.*.zone_tolerance"
    - "confluence.factor_weights.*"
    - "execution.stop_loss_distance"
    - "execution.take_profit_1_distance"
    - "execution.take_profit_2_distance"

  # Grid search bounds
  grid_search_space:
    wick_ratio: [0.60, 0.65, 0.70]
    body_ratio: [0.25, 0.30, 0.35]
    zone_tolerance: [3.0, 4.5, 6.0]
    sl_distance: [10.0, 12.0, 15.0]
    tp1_distance: [18.0, 20.0, 25.0]

  # Métricas objetivo
  target_metrics:
    min_f1_score: 0.65
    min_precision: 0.70      # Al menos 70% de señales deben ser válidas
    min_recall: 0.60         # Capturar al menos 60% de setups
    win_rate_target: 0.55    # 55% de trades ganadores

# ── LOGGING Y DEBUG ───────────────────────────────────────────────────────
logging:
  level: "INFO"
  log_all_detections: true   # Log incluso de patrones rechazados
  log_confluence_checks: true # Log detallado de factor scoring
  enable_backtesting_mode: false  # Timestamp virtual para replay

# ── METADATA ──────────────────────────────────────────────────────────────
metadata:
  version: "1.1.0"
  calibration_date: "2026-04-06"
  author: "Bot Alfa Price Action Scanner"
  methodology: "Eduardo (PRN-Million plus)"
  notes: |
    Calibración visual basada en presentación de Eduardo.
    - Zone tolerance aumentada a 4.5 (zonas no son líneas exactas)
    - Break and Retest weight = 2.5 (patrón visual principal)
    - Historical respect rate aumentada (precio respeta niveles tocados múltiples veces)
    - SL/TP ajustado para objetivos múltiples (imagen 3 muestra TP lejano)
    - Detección lateral confirma rechazo en rango consolidado
